<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Immersive Love Quest ❤️</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff8fa3;
            --bg-start: #1a1a1a;
            --bg-end: #050505;
        }

        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            /* Nature Gradient Background */
            background: linear-gradient(135deg, var(--bg-start), #0a1f0a, var(--bg-end));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Continuous Leaf Effect Background */
        #leaf-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            width: 15px; height: 15px;
            background-color: rgba(100, 200, 100, 0.6); /* Lighter Green */
            opacity: 0.8;
            border-radius: 2px 10px 2px 10px; /* Leaf Shape */
            animation: leafFall linear infinite;
        }

        @keyframes leafFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Main Content Container */
        #game-container {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            transition: transform 0.3s ease;
        }

        .level-badge {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 25px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-pic {
            width: 200px; height: 200px;
            border-radius: 25px;
            border: 4px solid var(--primary);
            object-fit: cover;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
            margin-bottom: 25px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 20px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            line-height: 1.7;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .game-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .game-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 30px rgba(255, 77, 109, 0.8);
        }

        .game-btn:active { transform: scale(0.95); }

        /* Unlock Icon */
        .unlock-icon {
            font-size: 1.3rem;
            margin-left: 10px;
            vertical-align: middle;
        }

        /* Confetti Elements */
        .confetti { position: fixed; z-index: 50; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

    </style>
</head>
<body>

    <div id="leaf-container"></div>

    <div id="game-container">
        <div id="level" class="level-badge">QUEST START 🚀</div>
        <div>
            <img src="vidhi.jpg.jpeg" id="mainPhoto" class="profile-pic">
        </div>
        
        <div class="message-card" id="msg">
            Are you ready for a full-screen magical journey of us? 🎁
        </div>
        
        <button class="game-btn" onclick="playGame()" id="gameBtn">Start Game <span class="unlock-icon">🔓</span></button>
    </div>

    <script>
        let step = 0;
        let isFullScreen = false;

        // Photo Names with extension from your screenshot
        const quests = [
            { level: "Level 1: Memories", text: "It's been one amazing year since we first met, and you have changed my life for the better. ✨", photo: "vidhi.jpg" },
            { level: "Level 2: The Apology", text: "I'm sorry for never officially proposing. I never wanted you to feel any pressure. 🙏", photo: "IMG.jpg" },
            { level: "Level 3: Commitment", text: "My love for you is a commitment to myself. Even if you ever leave, I will still love you. ❤️", photo: "chuu.jpg" },
            { level: "Level 4: Partnership", text: "I don't just want your happy moments. I deserve to be there for your sad days too. 🛡️", photo: "haha.jpg" },
            // Updated Level 5 with Sorry Message
            { level: "Level 5: Real Talk", text: "If I ever irritate you, please scold me! And I am truly sorry if I ever made a mistake. Please never hide your pain from me. 🌨️", photo: "hihi.jpg" },
            { level: "Level 6: Forever Queen", text: "I love you more than words can express, sweetheart. You are my everything, hamesha. 😘", photo: "kuku.jpg" }
        ];

        // Create Continuous Leaf Effect
        function initLeaves() {
            const container = document.getElementById('leaf-container');
            const leafSymbols = ['🍃', '🌿', '🌱', '🍁'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    // Random Leaf Symbol instead of just green boxes
                    leaf.innerHTML = leafSymbols[Math.floor(Math.random() * leafSymbols.length)];
                    leaf.style.left = Math.random() * 100 + 'vw';
                    leaf.style.fontSize = (Math.random() * 15 + 10) + 'px';
                    leaf.style.color = `rgba(${50 + Math.random()*100}, ${150 + Math.random()*100}, 50, 0.7)`;
                    leaf.style.animationDuration = (Math.random() * 8 + 5) + 's';
                    leaf.style.animationDelay = (Math.random() * 5) + 's';
                    container.appendChild(leaf);
                }, i * 200);
            }
        }
        initLeaves();

        // Full Screen Function
        function toggleFullScreen() {
            if (!isFullScreen) {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.mozRequestFullScreen) { // Firefox
                    document.documentElement.mozRequestFullScreen();
                } else if (document.documentElement.webkitRequestFullscreen) { // Chrome, Safari
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) { // IE/Edge
                    document.documentElement.msRequestFullscreen();
                }
                isFullScreen = true;
            }
        }

        function playGame() {
            const levelLabel = document.getElementById("level");
            const msgBox = document.getElementById("msg");
            const photo = document.getElementById("mainPhoto");
            const btn = document.getElementById("gameBtn");

            // Fullscreen trigger on first click after start
            if (step === 0) {
                toggleFullScreen();
            }

            // Confetti Effect
            createConfetti();

            if (step < quests.length) {
                levelLabel.innerHTML = quests[step].level;
                
                // Content transition
                msgBox.style.opacity = 0;
                photo.style.opacity = 0;
                
                setTimeout(() => {
                    msgBox.innerHTML = quests[step].text;
                    photo.src = quests[step].photo;
                    msgBox.style.opacity = 1;
                    photo.style.opacity = 1;
                    
                    // Button Text Update
                    if(step < quests.length - 1) {
                        btn.innerHTML = `Unlock Level ${step + 2} <span class="unlock-icon">🔓</span>`;
                    } else {
                        btn.innerHTML = `Final Surprise! 🏆`;
                    }
                    step++;
                }, 300);

            } else {
                // Final Celebration State
                levelLabel.innerHTML = "🏆 MISSION ACCOMPLISHED";
                levelLabel.style.background = "linear-gradient(45deg, #ffd700, #ff8c00)"; // Golden Badge
                levelLabel.style.color = "#000";
                
                msgBox.innerHTML = "<div style='font-size: 1.6rem;'>HAPPY BIRTHDAY!<br><b>I LOVE YOU FOREVER! ❤️</b><br><br><span style='font-size: 1rem;'>You unlocked the full journey!</span></div>";
                btn.style.display = "none";
                
                // Add final pop to photo
                photo.style.transform = "scale(1.1)";
                photo.style.boxShadow = "0 0 50px #ffd700";
                photo.src = "vidhi.jpg.jpeg"; // Back to first photo for final view

                // Automatic Confetti Loop
                setInterval(createConfetti, 200);
            }
        }

        function createConfetti() {
            for(let i=0; i<12; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                // Joyful mix: Hearts, Stars, Balloons
                c.innerHTML = ['❤️', '✨', '🎈', '⭐', '🌸'][Math.floor(Math.random()*5)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-5vh';
                c.style.fontSize = (Math.random() * 25 + 15) + 'px';
                c.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3500);
            }
        }
    </script>
</body>
</html>
